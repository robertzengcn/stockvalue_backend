repos:
  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict mode)
        entry: uv run mypy --strict .
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format .
        language: system
        pass_filenames: false
        always_run: true
