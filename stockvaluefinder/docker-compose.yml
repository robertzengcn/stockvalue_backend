services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stockvaluefinder
    ports:
      - "5433:5432"
    volumes:
      - stockvaluefinder_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d stockvaluefinder"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.10.0
    ports:
      - "6333:6333"
    volumes:
      - stockvaluefinder_qdrant_data:/qdrant/storage

  redis:
    image: redis:7.2-alpine
    ports:
      - "6380:6379"
    volumes:
      - stockvaluefinder_redis_data:/data

volumes:
  stockvaluefinder_postgres_data:
    name: stockvaluefinder_postgres_data
  stockvaluefinder_qdrant_data:
    name: stockvaluefinder_qdrant_data
  stockvaluefinder_redis_data:
    name: stockvaluefinder_redis_data
